# Local development: only PostgreSQL in Docker
# App runs locally via: npm run dev
# Usage: docker-compose -f docker-compose.local.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: recipe-manager-db-local
    environment:
      POSTGRES_USER: recipe_user
      POSTGRES_PASSWORD: local_password
      POSTGRES_DB: recipe_manager
    volumes:
      - postgres_data_local:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recipe_user -d recipe_manager"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data_local:
    driver: local
