name: Deploy to Uberspace

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run type-check
      - run: npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Uberspace via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.UBERSPACE_HOST }}
          username: ${{ secrets.UBERSPACE_USER }}
          key: ${{ secrets.UBERSPACE_SSH_KEY }}
          script: |
            set -e
            cd ~/mixer
            git fetch origin main
            git reset --hard origin/main
            # `npm ci` deletes and reinstalls node_modules from scratch on
            # every run, including recompiling the native better-sqlite3
            # addon — too memory-hungry for the Uberspace host and gets
            # OOM-killed (exit 137). `npm install` is incremental and only
            # touches what package-lock.json actually changed.
            npm install
            # Load build-time env (BASE_PATH, NEXT_PUBLIC_*) explicitly. The
            # client bundle bakes in NEXT_PUBLIC_BASE_PATH at build time, but
            # `next build` does not reliably auto-load .env.production in a
            # non-interactive SSH shell. Source it and fail loudly if BASE_PATH
            # is missing, so we never ship a build with an empty base path
            # (which would send every client fetch to "/api/..." instead of
            # "/rezepte/api/...").
            set -a
            [ -f .env.production ] && . ./.env.production
            set +a
            : "${BASE_PATH:?BASE_PATH not set - aborting to avoid shipping a broken sub-path build}"
            npm run build
            supervisorctl restart mixer
            # `next start` takes a few seconds to listen after a restart. Wait
            # until the app actually serves JSON under the base path on the
            # local port before declaring the deploy successful. This checks the
            # app directly (bypassing the Uberspace web frontend), so a failure
            # here points at the build/app, not at public routing.
            for i in $(seq 1 30); do
              ct=$(curl -sS -o /dev/null -w '%{content_type}' \
                "http://localhost:${PORT:-8723}${BASE_PATH}/api/recipes/ingredients" || true)
              echo "local readiness attempt $i: '$ct'"
              case "$ct" in
                application/json*) echo "app is serving JSON under ${BASE_PATH}"; exit 0 ;;
              esac
              sleep 2
            done
            echo "app did not become ready (no JSON from ${BASE_PATH}/api/...)" >&2
            exit 1

  smoke-test:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: API returns JSON under the base path
        run: |
          url="https://matt-maxx.de/rezepte/api/recipes/ingredients"
          for i in $(seq 1 24); do
            content_type=$(curl --silent --show-error \
              --output /dev/null --write-out '%{content_type}' "$url" || true)
            echo "attempt $i: Content-Type=$content_type"
            case "$content_type" in
              application/json*) echo "OK: API routing under /rezepte works"; exit 0 ;;
            esac
            sleep 5
          done
          echo "FAIL: API never returned JSON — base-path routing is broken" >&2
          exit 1
