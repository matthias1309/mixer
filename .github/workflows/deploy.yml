name: Deploy to Uberspace

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run type-check
      - run: npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Uberspace via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.UBERSPACE_HOST }}
          username: ${{ secrets.UBERSPACE_USER }}
          key: ${{ secrets.UBERSPACE_SSH_KEY }}
          script: |
            set -e
            cd ~/mixer
            git fetch origin main
            git reset --hard origin/main
            npm ci
            # Load build-time env (BASE_PATH, NEXT_PUBLIC_*) explicitly. The
            # client bundle bakes in NEXT_PUBLIC_BASE_PATH at build time, but
            # `next build` does not reliably auto-load .env.production in a
            # non-interactive SSH shell. Source it and fail loudly if BASE_PATH
            # is missing, so we never ship a build with an empty base path
            # (which would send every client fetch to "/api/..." instead of
            # "/rezepte/api/...").
            set -a
            [ -f .env.production ] && . ./.env.production
            set +a
            : "${BASE_PATH:?BASE_PATH not set - aborting to avoid shipping a broken sub-path build}"
            npm run build
            supervisorctl restart mixer

  smoke-test:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Page is reachable
        run: curl --fail --silent --show-error --output /dev/null https://matt-maxx.de/rezepte
      - name: API returns JSON under the base path
        run: |
          content_type=$(curl --silent --show-error \
            --output /dev/null --write-out '%{content_type}' \
            https://matt-maxx.de/rezepte/api/nutrition/ingredients)
          echo "Content-Type: $content_type"
          case "$content_type" in
            application/json*) echo "OK: API routing under /rezepte works" ;;
            *) echo "FAIL: expected JSON but got '$content_type' — base-path routing is broken"; exit 1 ;;
          esac
