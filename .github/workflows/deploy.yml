name: Deploy to Uberspace

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run type-check
      - run: npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Uberspace via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.UBERSPACE_HOST }}
          username: ${{ secrets.UBERSPACE_USER }}
          key: ${{ secrets.UBERSPACE_SSH_KEY }}
          script: |
            cd ~/mixer
            git fetch origin main
            git reset --hard origin/main
            npm ci
            npm run build
            supervisorctl restart mixer

  smoke-test:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Verify deployment is reachable
        run: curl --fail --silent --show-error --output /dev/null https://matt-maxx.de/rezepte
